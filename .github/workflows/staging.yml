name: staging

on:
  push:
    branches:
      - staging

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          docker build -t alma-fe-admin-stg . --build-arg VITE_BASE_URL=${{ secrets.VITE_BASE_URL_STG }}

      - name: Save Docker Image
        run: |
          docker save alma-fe-admin-stg > alma-fe-admin-stg.tar

      - name: Transfer Docker Image to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          source: "alma-fe-admin-stg.tar"
          target: "~/projects/alma/dev/stg/admin"

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Load and run image on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            cd ~/projects/alma/stg/fe/admin
            echo "Loading Docker image..."
            docker load < ~/projects/alma/stg/fe/admin/alma-fe-admin-stg.tar

            echo "Stopping and removing existing container..."
            docker stop alma-fe-admin-stg || true
            docker rm alma-fe-admin-stg || true

            echo "Creating named volume..."
            docker volume create alma-fe-admin-stg-data || true

            echo "Creating named network..."
            docker network create external-network || true

            echo "Running container..."
            docker compose up -d 

            echo "Deployment successful!"

            echo "Cleaning up..."
            docker image prune -f
